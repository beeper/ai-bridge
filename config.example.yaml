# Example configuration for the ai-bridge simple Matrix bridge.

homeserver:
  address: https://matrix-client.example.com
  domain: example.com
  verify_ssl: true
  async_media: true

appservice:
  address: http://localhost:29345
  hostname: 0.0.0.0
  port: 29345
  database: openai-bridge.db
  id: openai-gpt
  bot:
    username: gptbridge
    displayname: "AI Bridge"
  as_token: "GENERATE-A-TOKEN"
  hs_token: "GENERATE-A-TOKEN"

logging:
  level: info
  format: json

database:
  type: sqlite3-fk-wal
  uri: file:openai-bridge.db?_txlock=immediate
  max_open_conns: 1
  max_idle_conns: 1

metrics:
  enabled: true
  listen: 0.0.0.0:9000

encryption:
  allow: true
  default: false

network:
  beeper:
    base_url: ""
    token: ""

  providers:
    beeper:
      default_model: "anthropic/claude-opus-4.6"
      default_pdf_engine: "mistral-ocr"
    openai:
      api_key: ""
      base_url: "https://api.openai.com/v1"
      default_model: "openai/gpt-5.2"
    openrouter:
      api_key: ""
      base_url: "https://openrouter.ai/api/v1"
      default_model: "anthropic/claude-opus-4.6"
      default_pdf_engine: "mistral-ocr"

  default_system_prompt: |
    You are a helpful, concise assistant.
    Ask clarifying questions when needed.
    Follow the user's intent and be accurate.

  model_cache_duration: 6h

  bridge:
    log_ephemeral_events: false

  messages:
    responsePrefix: ""
    directChat:
      historyLimit: 20
    groupChat:
      historyLimit: 50
    queue:
      mode: "collect"
      debounceMs: 1000
      cap: 20
      drop: "summarize"

  commands:
    ownerAllowFrom: []

  channels:
    matrix:
      responsePrefix: ""

  session:
    scope: "per-sender"
    mainKey: "main"
    store: ""

  tools:
    search:
      provider: "openrouter"
      fallbacks: ["exa", "brave", "perplexity"]
      exa:
        api_key: ""
        base_url: "https://api.exa.ai"
        type: "auto"
        num_results: 5
        include_text: false
        text_max_chars: 500
      brave:
        api_key: ""
        base_url: "https://api.search.brave.com/res/v1/web/search"
      perplexity:
        api_key: ""
        base_url: "https://openrouter.ai/api/v1"
        model: "perplexity/sonar-pro"
      openrouter:
        api_key: ""
        base_url: "https://openrouter.ai/api/v1"
        model: "openai/gpt-5.2"
    fetch:
      provider: "exa"
      fallbacks: ["direct"]
      exa:
        api_key: ""
        base_url: "https://api.exa.ai"
        include_text: true
        text_max_chars: 5000
      direct:
        enabled: true
        timeout_seconds: 30
      max_chars: 50000
      max_redirects: 3
    media:
      concurrency: 2
      image:
        enabled: true
        prompt: "Describe the image."
        maxBytes: 10485760
        maxChars: 500
        timeoutSeconds: 60
      audio:
        enabled: true
        prompt: "Transcribe the audio."
        language: ""
        maxBytes: 20971520
        timeoutSeconds: 60
      video:
        enabled: true
        prompt: "Describe the video."
        maxBytes: 52428800
        timeoutSeconds: 120

  pruning:
    mode: "cache-ttl"
    ttl: "1h"
    enabled: true

  link_previews:
    enabled: true
    max_urls_inbound: 3
    max_urls_outbound: 5
    fetch_timeout: 10s
    max_content_chars: 500
    max_page_bytes: 10485760
    max_image_bytes: 5242880
    cache_ttl: 1h
